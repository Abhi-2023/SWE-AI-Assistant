services:
  app:
    build: .
    container_name: SWE_AI_Assistant
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - qdrant

    postgres:
      image: postgres:15
      environment:
        POSTGRES_USER: SWE_Assistant
        POSTGRES_PASSWORD: asdfkj513
        POSTGRES_DB: SWE_Assistant
      container_name: postgres
      ports:
        - "5432:5432"
      volumes:
        - pgdata:/var/lib/postgresql/data

    redis:
      image: redis:7-alpine
      container_name: redis
      ports:
        - "6379:6379"

    qdrant:
      image: qdrant/qdrant:v1.11.0
      container_name: qdrant
      ports:
        - "6333:6333"
        - "6334:6334"
      volumes:
        - qdrant_data:/qdrant/storage

    celery:
      build: .
      container_name: celery
      command: celery -A app.worker worker --loglevel=info
      env_file:
        - .env
      depends_on:
        - redis
        - postgres
        - qdrant

volumes:
  pgdata:
  qdrant_data:
